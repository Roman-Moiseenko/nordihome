services:  # PHP-FPM (Laravel)
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: php:8.4-fpm
    container_name: nordihome_php
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nordihome_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: nordihome_nginx
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - php
    networks:
      - nordihome_network

  # MySQL 8.0.19
  mysql:
    image: mysql:8.0.19
    container_name: nordihome_mysql
    tty: true
    user: root
    restart: unless-stopped
    environment:
        MYSQL_DATABASE: nordihome
        MYSQL_ROOT_PASSWORD: "foolprof"
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
        - ./docker/mysql/data:/var/lib/mysql
        - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nordihome_network

  # Redis (для кеша и сессий)
  redis:
    image: redis:7-alpine
    container_name: nordihome_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - nordihome_network

  # Node.js (для сборки фронтенда через Vite)
  node:
    image: node:20-alpine
    container_name: nordihome_node
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - VITE_DEV_SERVER_URL=http://localhost:5173
    command: >
        sh -c "
            if [ ! -d node_modules ]; then
                npm install
            fi &&
            npm run dev -- --host 0.0.0.0
        "
#      sh -c "npm install --include=dev --no-audit --no-fund 2>&1 && npm install @rollup/rollup-linux-x64-musl --no-save 2>&1; tail -f /dev/null"
    ports:
            - "5173:5173"
    networks:
      - nordihome_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  nordihome_network:
    driver: bridge
